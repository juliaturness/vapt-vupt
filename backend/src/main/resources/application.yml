# ==========================================
# COMO USAR OS PERFIS E VARIÁVEIS:
#
# 1. Rodando no IntelliJ (Local):
#    Por padrão, a linha "active: dev" abaixo faz o Spring iniciar no modo de desenvolvimento.
#    Você não precisa fazer nada para rodar localmente, basta dar Play.
#
# 2. Mudando de perfil no IntelliJ (Para testar staging/prod):
#    Vá em "Run" -> "Edit Configurations". Em "Environment variables", adicione:
#    SPRING_PROFILES_ACTIVE=staging
#
# 3. Rodando no Terminal ou Servidor (Deploy):
#    java -jar target/vapt-vupt-backend.jar --spring.profiles.active=prod
# ==========================================

# ==========================================
# CONFIGURAÇÕES GLOBAIS (Aplicado a todos os perfis)
# ==========================================
spring:
  application:
    name: vapt-vupt-backend
  profiles:
    active: dev # Perfil padrão carregado se nenhum outro for especificado

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

  # Indica que as migrations do Flyway devem rodar automaticamente
  flyway:
    enabled: true
    baseline-on-migrate: true

---
# ==========================================
# PERFIL: DEVELOPMENT (Local)
# COMO USAR: Rodado por padrão. Certifique-se de ter um banco de dados
# rodando localmente (ex: via Docker ou PgAdmin) com os dados abaixo.
# ==========================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # URL do seu banco de dados na sua própria máquina
    url: jdbc:postgresql://localhost:5432/vapt_vupt_dev
    username: root
    password: password
  jpa:
    hibernate:
      # 'validate' evita que o Hibernate crie tabelas por cima do Flyway
      ddl-auto: validate
    show-sql: true # Mostra as queries no console para facilitar o debug
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.example: DEBUG # Troque 'com.example' pelo seu package para ver logs locais

---
# ==========================================
# PERFIL: STAGING (Ambiente de Testes/Homologação)
# COMO USAR: Defina as variáveis no ambiente onde a aplicação vai rodar.
# Exemplo no Linux/Mac:
# export STAGING_DB_USER="usuario" && export STAGING_DB_PASS="senha123"
# ==========================================
spring:
  config:
    activate:
      on-profile: staging

  datasource:
    # O ":jdbc:postgresql..." após a variável serve como um "fallback" (valor padrão)
    # caso a variável STAGING_DB_URL não seja encontrada no ambiente.
    url: ${STAGING_DB_URL:jdbc:postgresql://localhost:5432/vapt_vupt_staging}
    # Estas variáveis OBRIGATORIAMENTE devem ser injetadas pela plataforma de deploy (AWS, Docker, etc)
    username: ${STAGING_DB_USER}
    password: ${STAGING_DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false # Desligado para economizar recursos de processamento

logging:
  level:
    root: INFO

---
# ==========================================
# PERFIL: PRODUCTION (Produção Real)
# COMO USAR: Ao fazer o deploy final, o seu serviço de hospedagem
# exigirá que você cadastre essas variáveis de ambiente no painel de controle.
# NUNCA digite senhas reais diretamente neste arquivo!
# ==========================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USER}
    password: ${PROD_DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Segurança: Oculta a documentação do Swagger para usuários externos na internet
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN # Em produção, mostramos apenas alertas e erros globais
    com.example: INFO # Mas mantemos os logs de informação do nosso próprio código
