# ==========================================
# BANCO DE DADOS
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/swift_way
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
# "validate" ? Hibernate confere se as tabelas existem ao iniciar.
# O Boot garante automaticamente que o Flyway roda antes do JPA
# quando spring.flyway.enabled=true (comportamento padr„o desde Boot 2).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# FLYWAY ? gerenciado 100% pelo autoconfigure do Boot
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG
spring.flyway.baseline-on-migrate=false

# ==========================================
# REDIS
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ==========================================
# JWT
# ==========================================
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=604800
