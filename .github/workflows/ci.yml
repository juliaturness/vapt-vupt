name: CI Pipeline - SWIFT WAY

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build, Test and Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Dar permissão de execução ao Gradle Wrapper
        run: chmod +x backend/gradlew

      - name: Executar Testes Unitários e de Integração
        run: cd backend && ./gradlew test

      - name: Gerar Relatório de Cobertura (
        run: cd backend && ./gradlew jacocoTestReport jacocoTestCoverageVerification
