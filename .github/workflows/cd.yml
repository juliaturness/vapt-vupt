name: CD Pipeline - VAPT VUPT

on:
  push:
    branches:
      - main

jobs:
  build-and-push-docker:
    name: Build e Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login no Docker Hub (ou outro Container Registry)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da Imagem do Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: seunome/vapt-vupt-backend:latest, seunome/vapt-vupt-backend:${{ github.sha }}

  deploy-staging:
    name: Deploy em Staging
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Deploy Staging
        run: echo "Substitua este passo pelo script de deploy no seu servidor de Staging"

  deploy-production:
    name: Deploy em Produção
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production # É isso que ativa a APROVAÇÃO MANUAL no GitHub
    steps:
      - name: Trigger Deploy Production
        run: echo "Substitua este passo pelo script de deploy no seu servidor de Produção"
